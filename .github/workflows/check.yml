name: Not Kontrol

on:
  schedule:
    - cron: "*/15 * * * *"   # her 15 dakikada bir (GitHub yuk durumuna gore birkac dk gecikebilir)
  workflow_dispatch: {}       # elle tetikleme

# state.json'i commit edebilmek icin yazma izni
permissions:
  contents: write

# Ayni anda birden fazla kosuyu engelle
concurrency:
  group: not-kontrol
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10          # takilan kosu dakikalari tuketmesin
    # Chromium + tum sistem kutuphaneleri hazir gelir (kurulum/apt yok)
    container:
      image: mcr.microsoft.com/playwright/python:v1.60.0-jammy
    steps:
      - name: Git hazirla
        run: |
          command -v git >/dev/null || (apt-get update && apt-get install -y --no-install-recommends git)
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Checkout
        uses: actions/checkout@v4

      - name: Bagimliliklari kur
        run: pip install --no-cache-dir -r requirements.txt

      - name: Notlari kontrol et
        env:
          FIRAT_USERNAME: ${{ secrets.FIRAT_USERNAME }}
          FIRAT_PASSWORD: ${{ secrets.FIRAT_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check.py

      - name: Durumu kaydet (state.json)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: not durumu guncellendi [skip ci]"
            git push
          else
            echo "Degisiklik yok, commit edilmedi."
          fi
